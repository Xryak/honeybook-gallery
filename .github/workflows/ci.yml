name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend · lint + types + tests (99% cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "./backend[dev,ai]"
      - name: Ruff
        run: cd backend && ruff check .
      - name: Mypy
        run: cd backend && mypy app
      - name: Pytest (+ coverage gate)
        run: cd backend && pytest

  frontend-unit:
    name: Frontend · typecheck + Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: Typecheck
        run: cd frontend && npm run typecheck
      - name: Vitest (+ coverage)
        run: cd frontend && npm run test:coverage

  personas:
    name: AI · synthetic-persona suite + framework tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "./backend[dev,ai]"
      - name: Run persona suite (deterministic)
        run: cd ai-testing && python -m persona_suite
      - name: Framework meta-tests
        run: cd ai-testing && python -m pytest tests -q
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: persona-report
          path: ai-testing/reports/

  e2e:
    name: E2E · Playwright (real backend + frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Backend venv (playwright webServer launches it)
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install -e "./backend[dev]"
      - run: cd frontend && npm ci
      - run: cd frontend && npx playwright install --with-deps chromium
      - name: Playwright
        # Flag scoped to this step only — the runner's bundled node (used by
        # actions/*) is older and rejects it; node 22 here needs it for node:sqlite.
        env:
          NODE_OPTIONS: --experimental-sqlite
        run: cd frontend && npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/

  docker:
    name: Docker · build + compose smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build + start the stack
        run: docker compose up --build -d
      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            s=$(docker inspect --format '{{.State.Health.Status}}' $(docker compose ps -q backend))
            echo "backend: $s"; [ "$s" = "healthy" ] && break; sleep 2
          done
      - name: Smoke test the full OTP → gallery flow through nginx
        run: |
          set -euo pipefail
          curl -fsS http://localhost:8080/galleries/g_001 -o /dev/null
          curl -fsS http://localhost:8080/static/photos/thumb/p_001.jpg -o /dev/null
          curl -fsS http://localhost:8080/static/photos/full/p_001.jpg -o /dev/null
          docker compose exec -T backend python -m app.cli send-otp g_001
          CODE=$(docker compose logs backend | grep '\[OTP\] Gallery g_001' | tail -1 | sed -E 's/.*g_001: ([0-9]{6}).*/\1/')
          TOKEN=$(curl -fsS -X POST http://localhost:8080/api/galleries/g_001/verify -H 'Content-Type: application/json' -d "{\"code\":\"$CODE\"}" | python3 -c "import sys,json;print(json.load(sys.stdin)['token'])")
          curl -fsS http://localhost:8080/api/galleries/g_001 -H "Authorization: Bearer $TOKEN" | python3 -c "import sys,json;assert len(json.load(sys.stdin)['photos'])==10"
          echo "Docker smoke flow OK"
      - if: always()
        run: docker compose down
