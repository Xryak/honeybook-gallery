server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API + static photos are proxied to the backend container so the browser
    # stays same-origin and the frontend keeps using relative URLs.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        # Seed photos never change once generated — let the browser cache them.
        expires 1h;
        add_header Cache-Control "public";
    }

    # SPA history-mode fallback: deep links like /galleries/g_001 must serve
    # index.html and let Vue Router take over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
